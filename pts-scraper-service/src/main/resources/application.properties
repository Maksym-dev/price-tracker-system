spring.application.name=pts-scraper-service

server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/ptsDb
spring.datasource.username=myuser
spring.datasource.password=mypassword
spring.datasource.driver-class-name=org.postgresql.Driver
# Keep the connection alive if idle for a long time (needed in production)
spring.datasource.testWhileIdle=true
spring.datasource.validationQuery=SELECT 1
# Show or not log for each sql query
spring.jpa.show-sql=true
# Force table creation from entity definitions
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Allows Hibernate to generate SQL optimized for a particular DBMS
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.mhridin.pts_common.kafka
app.kafka.topics.price-update=price-update-events

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=strongpassword123
