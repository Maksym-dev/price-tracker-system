spring.application.name=pts-scraper-service

server.port=8081

spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.mhridin.pts_common.kafka
app.kafka.topics.price-update=price-update-events

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=strongpassword123
