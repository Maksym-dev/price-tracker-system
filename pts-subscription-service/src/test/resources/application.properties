spring.application.name=pts-subscription-service

# Enable the H2 console for debugging during test runs
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Custom JDBC URL for an in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
# The driver class name is often inferred automatically by Spring Boot,
# but if specified explicitly, it should be correct:
spring.datasource.driver-class-name=org.h2.Driver
# Force table creation from entity definitions
spring.jpa.hibernate.ddl-auto=create-drop

# Optional: ensure data.sql and schema.sql are run
# spring.sql.init.mode=always

spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.mhridin.pts_common.kafka
app.kafka.topics.price-check=price-check-tasks
app.kafka.topics.notifications=notification-events